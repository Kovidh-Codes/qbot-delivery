# Default parameters for delivery_bot, intent, and teleop nodes.
# Tuned for real Quanser QBot Platform.

delivery_bot_state_machine:
  ros__parameters:
    cmd_vel_topic:     "/cmd_vel"
    odom_topic:        "/odom"
    scan_topic:        "/scan"
    state_topic:       "/robot_state"
    destination_topic: "/destination"
    # Tuned for QBot Platform (real bot needs > 0.3 m/s to overcome friction)
    linear_speed:      0.4
    angular_speed:     1.0
    steering_gain:     0.8
    goal_tolerance:    0.3
    obstacle_distance: 0.3
    signal_duration:   2.0
    handoff_duration:  3.0
    deliver_duration:  2.0
    watchdog_timeout:  20.0
    waypoints_file:    "/home/nvidia/qbot-delivery/waypoints.json"

intent_communication:
  ros__parameters:
    state_topic:     "/robot_state"
    color_topic:     "/intent/color"
    display_topic:   "/intent/display"
    voice_topic:     "/voice/announce"
    led_strip_topic: "/qbot_led_strip"
    enable_led:      true
    enable_local_voice: false   # set true if espeak installed on bot

wasd_teleop:
  ros__parameters:
    cmd_vel_topic: "/cmd_vel"
    linear_speed:  0.4
    angular_speed: 1.0
